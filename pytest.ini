[pytest]
# Pytest 配置文件

# 测试目录
testpaths = tests

# Python 文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 最小化导入模式
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记定义
markers =
    slow: 标记为慢速测试
    db: 标记为数据库测试
    ai: 标记为 AI 模型测试
    asyncio: 标记为异步测试

# 测试收集忽略
norecursedirs = .git .venv __pycache__ damo logs temp

# 日志配置
log_cli = false
log_cli_level = INFO

# 超时配置
timeout = 300

# 控制台输出
console_output_style = progress
